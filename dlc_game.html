<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <title>Disney Princesses: an enchanted journey continues</title>
    <link rel="stylesheet" href="/css/dlc_gamestyle.css"> 
    <link rel="script" href="/js/dlc_gamescript.js">
</head>
<body>
    <a-scene>
        <a-sky color="#DDDDDD"></a-sky>
        <a-box 
        position="0.5 0.5 -3" 
        rotation="0 10 0" 
        color="#F20670"
        animation="property: rotation; from: 20 0 0; to: 20 360 0; dir: alternate;
        loop: true; dur: 4000; easing: easeInOutQuad;">
        </a-box>
        <a-entity
        geometry="
            primitive: torus;
            radius: 1;
            radiusTubular: 0.1;
            segmentsTubular: 12;"
            
        material="
            color:#F20670;
            roughness: 0.1;
            metalness: 0.5;"
        rotation="10 0 0"
        position="-3 1 0"
        animation="property: scale; to: 1 0.5 1; direction: alternate; dur: 2000;
        loop: true; easing: linear;">
        </a-entity>

        <a-camera
             position="0 1 4"
             cursor-visible="true"
             cursor-scale="2"
             cursor-color="#0095DD"
             cursor-opacity="0.5">
        </a-camera>
    </a-scene>
    <script>
        const scene = document.querySelector("a-scene");
        const cylinder = document.createElement("a-cylinder");
        cylinder.setAttribute("color", "#FBFF00");
        cylinder.setAttribute("height", "2");
        cylinder.setAttribute("radius", "0.75");
        cylinder.setAttribute("position", "3 1 0");
        scene.appendChild(cylinder);
        let t = 0;
        function render() {
        t += 0.01;
        requestAnimationFrame(render);
        cylinder.setAttribute("position", `3 ${Math.sin(t * 2) + 1} 0`);
        }
        render();
    </script>
</body>
</html>
